<!DOCTYPE html>
<html>
<head>
  <title>Simple Contact Book</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #eddbad;
    }
    h1 {
      color: #d05656;
      text-shadow: 4px 3px 5px #ffffff ;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-color: #d05656;
    }
    #contactList {
      margin-top: 20px;
    }
    #contact {
        width: 500px;
      background: hsl(0, 54%, 65%);
      padding: 20px;
      margin-bottom: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1> Contact Book</h1>

  <input type="text" id="name" placeholder="Name">
  <input type="number" id="phone" placeholder="Phone">
  <button onclick="addContact()">Add</button>

  <div id="contactList">
  </div>

  <script>
    function addContact(){
      let name = document.getElementById('name').value
      let phone = document.getElementById('phone').value


      let contactDiv = document.createElement("h3")
      contactDiv.id = 'contact';
      contactDiv.innerText = "Name: "+name+"| Phone: "+phone ;

      document.getElementById('contactList').appendChild(contactDiv)

      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
    }
  </script>

</body>
</html>
